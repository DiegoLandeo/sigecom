name: SIGECOM CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas unitarias
        run: ./mvnw -Dtest=ComputadoraServiceTest test

      - name: Construir paquete JAR
        run: ./mvnw clean package -DskipTests

      - name: Publicar artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: sigekom-jar
          path: target/*.jar

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ghcr.io/diegolandeo/sigekom-app:latest .

      - name: Publicar imagen Docker
        run: docker push ghcr.io/diegolandeo/sigekom-app:latest