name: SIGECOM CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas unitarias
        run: ./mvnw -Dtest=ComputadoraServiceTest test

      - name: Construir paquete del sistema
        run: ./mvnw clean package -DskipTests

      - name: Publicar artefacto generado
        uses: actions/upload-artifact@v4
        with:
          name: sigekom-jar
          path: target/*.jar