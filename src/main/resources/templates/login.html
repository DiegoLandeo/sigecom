<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SIGECOM | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="login-body">

<div class="container min-vh-100 d-flex align-items-center justify-content-center">

    <div class="row w-100 justify-content-center">

        <div class="col-lg-9">
            <div class="card border-0 shadow login-card overflow-hidden">

                <div class="row g-0">

                    <div class="col-md-6 login-panel text-white p-5 d-flex flex-column justify-content-center">
                        <div>
                            <div class="login-icon mb-4">
                                <i class="bi bi-pc-display-horizontal"></i>
                            </div>

                            <h2 class="text-white">
                                SIGECOM
                            </h2>

                            <p class="mb-0">
                                Sistema de Gestión de Computadoras de la Facultad de Informática.
                            </p>
                        </div>
                    </div>

                    <div class="col-md-6 bg-white p-5">

                        <div class="mb-4">
                            <h3 class="fw-bold mb-1">Iniciar sesión</h3>
                            <p class="text-muted mb-0">
                                Acceso restringido al área de TI.
                            </p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle me-1"></i>
                            Usuario o contraseña incorrectos.
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success">
                            <i class="bi bi-check-circle me-1"></i>
                            Sesión cerrada correctamente.
                        </div>

                        <form th:action="@{/login}" method="post">

                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-person"></i>
                                    </span>
                                    <input type="text"
                                           name="username"
                                           class="form-control"
                                           placeholder="Ingrese su usuario"
                                           required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password"
                                           name="password"
                                           class="form-control"
                                           placeholder="Ingrese su contraseña"
                                           required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-box-arrow-in-right me-1"></i>
                                Ingresar
                            </button>

                        </form>

                    </div>

                </div>

            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
